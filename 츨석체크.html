<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 출석 관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-btn.active-출석 { background-color: #22c55e; color: white; border-color: #22c55e; }
        .status-btn.active-결석 { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.active-지각 { background-color: #f59e0b; color: white; border-color: #f59e0b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 flex justify-center items-center gap-2">
                <i data-lucide="users" class="w-8 h-8 text-indigo-600"></i>
                학생 출석 체크
            </h1>
            <p class="text-slate-500 mt-2">실시간으로 학생들의 출석 상태를 기록하고 관리하세요.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 입력 폼 섹션 -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-slate-700">출석 기록하기</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">학생 이름</label>
                            <input type="text" id="studentName" placeholder="이름을 입력하세요" 
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">상태 선택</label>
                            <div class="grid grid-cols-3 gap-2" id="statusGroup">
                                <button onclick="selectStatus('출석')" class="status-btn border border-slate-200 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-all">출석</button>
                                <button onclick="selectStatus('결석')" class="status-btn border border-slate-200 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-all">결석</button>
                                <button onclick="selectStatus('지각')" class="status-btn border border-slate-200 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 transition-all">지각</button>
                            </div>
                        </div>

                        <button onclick="saveAttendance()" 
                            class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-100 mt-4">
                            기록 저장하기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 목록 섹션 -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="text-lg font-semibold text-slate-700">최근 출석 명단</h2>
                        <span id="recordCount" class="text-xs bg-slate-100 text-slate-500 px-2 py-1 rounded-full">0 entries</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-sm">
                                <tr>
                                    <th class="px-6 py-3 font-medium">이름</th>
                                    <th class="px-6 py-3 font-medium">상태</th>
                                    <th class="px-6 py-3 font-medium">시간</th>
                                    <th class="px-6 py-3 font-medium text-right">관리</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceList" class="divide-y divide-slate-100">
                                <!-- 데이터가 여기에 동적으로 추가됩니다 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK 로드 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 본인의 Firebase 설정값으로 교체하세요 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyCSh1RXF2HZM3otvoyJ0E_DSEjZjp0R1Uc",
  authDomain: "test-003-ca864.firebaseapp.com",
  projectId: "test-003-ca864",
  storageBucket: "test-003-ca864.firebasestorage.app",
  messagingSenderId: "889052976261",
  appId: "1:889052976261:web:5bd8b9f49e91a50c1d85ec"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        let selectedStatus = "";

        // 상태 선택 함수 (Global 스코프를 위해 window에 할당)
        window.selectStatus = (status) => {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active-출석', 'active-결석', 'active-지각');
                if(btn.innerText === status) {
                    btn.classList.add(`active-${status}`);
                }
            });
        };

        // 데이터 저장 함수
        window.saveAttendance = async () => {
            const nameInput = document.getElementById('studentName');
            const name = nameInput.value.trim();

            if (!name) { alert("학생 이름을 입력해주세요."); return; }
            if (!selectedStatus) { alert("출석 상태를 선택해주세요."); return; }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: selectedStatus,
                    timestamp: serverTimestamp()
                });
                
                // 입력창 초기화
                nameInput.value = "";
                selectedStatus = "";
                document.querySelectorAll('.status-btn').forEach(btn => 
                    btn.classList.remove('active-출석', 'active-결석', 'active-지각')
                );
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("저장 중 오류가 발생했습니다.");
            }
        };

        // 삭제 함수
        window.deleteRecord = async (id) => {
            if(confirm("이 기록을 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "attendance", id));
            }
        };

        // 실시간 데이터 감시
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('attendanceList');
            const countElement = document.getElementById('recordCount');
            listElement.innerHTML = "";
            countElement.innerText = `${snapshot.size} entries`;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleString('ko-KR', { hour12: false, month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : "방금 전";
                
                let statusColor = "";
                if(data.status === '출석') statusColor = "bg-green-100 text-green-700";
                else if(data.status === '결석') statusColor = "bg-red-100 text-red-700";
                else statusColor = "bg-amber-100 text-amber-700";

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-700">${data.name}</td>
                        <td class="px-6 py-4">
                            <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${statusColor}">
                                ${data.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-500">${date}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteRecord('${doc.id}')" class="text-slate-400 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
                listElement.innerHTML += row;
            });
            lucide.createIcons(); // 아이콘 렌더링
        });

        // 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
